services:
  iron-county-tracker:
    build: .
    container_name: iron-county-tracker
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iron-county.rule=Host(`iron-county.angrypacket.net`)"
      - "traefik.http.routers.iron-county.entrypoints=websecure"
      - "traefik.http.routers.iron-county.tls=true"
      - "traefik.http.routers.iron-county.tls.certresolver=letsencrypt"
      - "traefik.http.services.iron-county.loadbalancer.server.port=80"
    volumes:
      - tracker-data:/data
    restart: unless-stopped

volumes:
  tracker-data:
